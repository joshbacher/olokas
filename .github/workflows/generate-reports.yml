name: Cron — generate-reports

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: cron-generate-reports
  cancel-in-progress: false

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Invoke /api/cron/generate-reports
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w '%{http_code}' \
            --max-time 120 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://olokas.com/api/cron/generate-reports")
          echo "Response body: $(cat /tmp/response.txt)"
          echo "HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "::error::Non-2xx response from /api/cron/generate-reports: $HTTP_STATUS"
            exit 1
          fi
