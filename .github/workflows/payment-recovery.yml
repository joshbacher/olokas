name: Cron — payment-recovery

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: cron-payment-recovery
  cancel-in-progress: false

jobs:
  payment-recovery:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Invoke /api/cron/payment-recovery
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w '%{http_code}' \
            --max-time 60 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://olokas.com/api/cron/payment-recovery")
          echo "Response body: $(cat /tmp/response.txt)"
          echo "HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "::error::Non-2xx response from /api/cron/payment-recovery: $HTTP_STATUS"
            exit 1
          fi
