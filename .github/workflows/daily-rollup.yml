name: Cron — daily-rollup

on:
  schedule:
    - cron: "55 23 * * *"
  workflow_dispatch:

concurrency:
  group: cron-daily-rollup
  cancel-in-progress: false

jobs:
  daily-rollup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Invoke /api/cron/daily-rollup
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w '%{http_code}' \
            --max-time 60 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://olokas.com/api/cron/daily-rollup")
          echo "Response body: $(cat /tmp/response.txt)"
          echo "HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "::error::Non-2xx response from /api/cron/daily-rollup: $HTTP_STATUS"
            exit 1
          fi
