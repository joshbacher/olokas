name: Cron — recover-stuck-jobs

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: cron-recover-stuck-jobs
  cancel-in-progress: false

jobs:
  recover-stuck-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Invoke /api/cron/recover-stuck-jobs
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w '%{http_code}' \
            --max-time 30 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://olokas.com/api/cron/recover-stuck-jobs")
          echo "Response body: $(cat /tmp/response.txt)"
          echo "HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "::error::Non-2xx response from /api/cron/recover-stuck-jobs: $HTTP_STATUS"
            exit 1
          fi
